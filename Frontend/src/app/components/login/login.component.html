<div class="login-wrapper animate-fade-in">
  <div class="glass-card login-card">
    <div class="brand-header">
      <span class="material-icons-round brand-icon">grass</span>
      <h1>{{ t.loginTitle }}</h1>
      <p>{{ t.loginSub }}</p>
    </div>
    
    <div class="form-group">
      <label>{{ t.emailLabel }}</label>
      <input type="email" [placeholder]="t.emailLabel" [(ngModel)]="loginData.email">
    </div>

    <div class="form-group">
      <label>{{ t.passwordLabel }}</label>
      <input type="password" [placeholder]="t.passwordLabel" [(ngModel)]="loginData.password">
    </div>

    <button class="btn-primary login-btn" (click)="login()">
      {{ t.loginBtn }}
    </button>

    <div class="form-footer">
      <a routerLink="/register">{{ t.noAccount }}</a>
    </div>
  </div>
</div>
