spring.application.name=AgricultureAdvisor

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:agriculturedb}?useSSL=true&requireSSL=true&verifyServerCertificate=false

spring.datasource.username=${DB_USER:root}

spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

server.port=${PORT:8080}